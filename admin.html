<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | DevFolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              card: 'hsl(var(--card))',
              primary: 'hsl(var(--primary))',
              border: 'hsl(var(--border))',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-background text-foreground font-sans antialiased">
    <div class="min-h-screen flex flex-col">
      <!-- Top Bar -->
      <header class="border-b border-white/5 bg-background/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary/20 border border-primary/30 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
            </div>
            <span class="font-semibold text-white tracking-tight">Admin</span>
          </div>
          <div class="flex items-center gap-4">
            <a href="./index.html" class="text-sm text-white/60 hover:text-white transition-colors">View Site</a>
            <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 overflow-hidden">
              <img src="./assets/images/avatar.png" alt="Avatar" class="w-full h-full object-cover">
            </div>
          </div>
        </div>
      </header>

      <div class="flex-1 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-[240px,1fr] gap-8 p-6">
        <!-- Sidebar -->
        <aside class="space-y-2">
          <nav class="space-y-1">
            <a href="./admin.html" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-primary/10 border border-primary/20 text-white transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
              Dashboard
            </a>
            <a href="./admin-projects.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              Projects
            </a>
            <a href="./admin-security.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
              Security
            </a>
          </nav>
        </aside>

        <!-- Main Content -->
        <main class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-card/40 border border-white/5 rounded-2xl p-6 hover:border-white/10 transition-colors">
              <div class="text-xs uppercase tracking-widest text-white/40 mb-2">Total Projects</div>
              <div class="text-3xl font-bold text-white">3</div>
            </div>
            <div class="bg-card/40 border border-white/5 rounded-2xl p-6 hover:border-white/10 transition-colors">
              <div class="text-xs uppercase tracking-widest text-white/40 mb-2">Visitor Traffic</div>
              <div class="text-3xl font-bold text-white">+2.4k</div>
            </div>
            <div class="bg-card/40 border border-white/5 rounded-2xl p-6 hover:border-white/10 transition-colors">
              <div class="text-xs uppercase tracking-widest text-white/40 mb-2">Uptime</div>
              <div class="text-3xl font-bold text-primary">99.9%</div>
            </div>
          </div>

          <div class="bg-card/40 border border-white/5 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-semibold text-white">Recent Activity</h2>
              <a href="./admin-projects.html" class="text-primary hover:text-primary/80 text-sm font-medium transition-colors">View all projects &rarr;</a>
            </div>
            <div class="space-y-4">
              <div class="flex items-center justify-between p-4 rounded-2xl border border-white/5 bg-white/5">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path></svg>
                  </div>
                  <div>
                    <div class="text-sm font-medium text-white">Project updated</div>
                    <div class="text-xs text-white/50">Commerce Command was modified</div>
                  </div>
                </div>
                <div class="text-xs text-white/40">2 hours ago</div>
              </div>
              <div class="flex items-center justify-between p-4 rounded-2xl border border-white/5 bg-white/5">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 rounded-lg bg-green-500/10 border border-green-500/20 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
                  </div>
                  <div>
                    <div class="text-sm font-medium text-white">Security Scan</div>
                    <div class="text-xs text-white/50">No vulnerabilities found</div>
                  </div>
                </div>
                <div class="text-xs text-white/40">1 day ago</div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
