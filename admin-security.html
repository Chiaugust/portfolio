<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security | Admin Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              card: 'hsl(var(--card))',
              primary: 'hsl(var(--primary))',
              border: 'hsl(var(--border))',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-background text-foreground font-sans antialiased">
    <div class="min-h-screen flex flex-col">
      <!-- Top Bar -->
      <header class="border-b border-white/5 bg-background/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary/20 border border-primary/30 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
            </div>
            <span class="font-semibold text-white tracking-tight">Admin</span>
          </div>
          <div class="flex items-center gap-4">
            <a href="./index.html" class="text-sm text-white/60 hover:text-white transition-colors">View Site</a>
            <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 overflow-hidden">
              <img src="./assets/images/avatar.png" alt="Avatar" class="w-full h-full object-cover">
            </div>
          </div>
        </div>
      </header>

      <div class="flex-1 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-[240px,1fr] gap-8 p-6">
        <!-- Sidebar -->
        <aside class="space-y-2">
          <nav class="space-y-1">
            <a href="./admin.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
              Dashboard
            </a>
            <a href="./admin-projects.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              Projects
            </a>
            <a href="./admin-security.html" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-primary/10 border border-primary/20 text-white transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
              Security
            </a>
          </nav>
        </aside>

        <!-- Main Content -->
        <main class="space-y-6">
          <div class="bg-card/40 border border-white/5 rounded-3xl p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Security Settings</h2>
            
            <div class="grid gap-8">
              <!-- Password Section -->
              <div class="p-6 rounded-2xl border border-white/10 bg-white/5">
                <h3 class="text-lg font-medium text-white mb-4">Change Password</h3>
                <div class="space-y-4 max-w-md">
                  <div>
                    <label class="block text-xs text-white/60 mb-1">Current Password</label>
                    <input type="password" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                  </div>
                  <div>
                    <label class="block text-xs text-white/60 mb-1">New Password</label>
                    <input type="password" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                  </div>
                  <div>
                    <label class="block text-xs text-white/60 mb-1">Confirm New Password</label>
                    <input type="password" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                  </div>
                  <button class="px-4 py-2 bg-primary/20 text-primary font-medium rounded-lg text-sm hover:bg-primary/30 transition-colors mt-2">Update Password</button>
                </div>
              </div>

              <!-- CSRF Section -->
              <div class="p-6 rounded-2xl border border-white/10 bg-white/5">
                <h3 class="text-lg font-medium text-white mb-2">Backend Security Checklist</h3>
                <p class="text-sm text-white/60 mb-4">Ensure these features are implemented in your PHP backend.</p>
                
                <div class="space-y-3">
                  <label class="flex items-start gap-3 cursor-pointer group">
                    <input type="checkbox" checked disabled class="mt-1 w-4 h-4 rounded border-white/10 bg-background accent-primary">
                    <div>
                      <div class="text-sm text-white font-medium">CSRF Protection</div>
                      <div class="text-xs text-white/50">All forms and API endpoints should require a valid CSRF token.</div>
                    </div>
                  </label>
                  <label class="flex items-start gap-3 cursor-pointer group">
                    <input type="checkbox" checked disabled class="mt-1 w-4 h-4 rounded border-white/10 bg-background accent-primary">
                    <div>
                      <div class="text-sm text-white font-medium">Prepared Statements</div>
                      <div class="text-xs text-white/50">Use PDO or similar libraries for all database queries to prevent SQL injection.</div>
                    </div>
                  </label>
                  <label class="flex items-start gap-3 cursor-pointer group">
                    <input type="checkbox" checked disabled class="mt-1 w-4 h-4 rounded border-white/10 bg-background accent-primary">
                    <div>
                      <div class="text-sm text-white font-medium">Input Sanitization</div>
                      <div class="text-xs text-white/50">Sanitize and validate all user inputs before processing or displaying them.</div>
                    </div>
                  </label>
                </div>
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>
  </body>
</html>
