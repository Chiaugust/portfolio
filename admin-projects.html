<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Admin Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              card: 'hsl(var(--card))',
              primary: 'hsl(var(--primary))',
              border: 'hsl(var(--border))',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-background text-foreground font-sans antialiased">
    <div class="min-h-screen flex flex-col">
      <!-- Top Bar -->
      <header class="border-b border-white/5 bg-background/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary/20 border border-primary/30 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
            </div>
            <span class="font-semibold text-white tracking-tight">Admin</span>
          </div>
          <div class="flex items-center gap-4">
            <a href="./index.html" class="text-sm text-white/60 hover:text-white transition-colors">View Site</a>
            <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 overflow-hidden">
              <img src="./assets/images/avatar.png" alt="Avatar" class="w-full h-full object-cover">
            </div>
          </div>
        </div>
      </header>

      <div class="flex-1 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-[240px,1fr] gap-8 p-6">
        <!-- Sidebar -->
        <aside class="space-y-2">
          <nav class="space-y-1">
            <a href="./admin.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
              Dashboard
            </a>
            <a href="./admin-projects.html" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-primary/10 border border-primary/20 text-white transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              Projects
            </a>
            <a href="./admin-security.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 border border-transparent transition-all text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/60"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
              Security
            </a>
          </nav>
        </aside>

        <!-- Main Content -->
        <main class="space-y-6">
          <div class="bg-card/40 border border-white/5 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-semibold text-white">Projects Management</h2>
              <button class="px-4 py-2 bg-primary/20 text-primary rounded-lg text-sm font-medium hover:bg-primary/30 transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New Project
              </button>
            </div>
            
            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead class="text-xs text-white/40 uppercase tracking-wider border-b border-white/5">
                  <tr>
                    <th class="pb-4 font-medium">Project</th>
                    <th class="pb-4 font-medium">Tech Stack</th>
                    <th class="pb-4 font-medium">Date</th>
                    <th class="pb-4 text-right font-medium">Actions</th>
                  </tr>
                </thead>
                <tbody class="text-sm divide-y divide-white/5">
                  <tr>
                    <td class="py-4 text-white">
                      <div class="flex items-center gap-4">
                        <img src="./assets/images/project-1.png" class="w-20 h-14 rounded-lg object-cover border border-white/10" alt="Thumbnail">
                        <div>
                          <div class="font-medium text-white">Commerce Command</div>
                          <div class="text-xs text-primary mt-1">Featured</div>
                        </div>
                      </div>
                    </td>
                    <td class="py-4 text-white/60">React, PHP</td>
                    <td class="py-4 text-white/60">Feb 24, 2026</td>
                    <td class="py-4 text-right">
                      <button class="text-primary hover:text-white transition-colors mr-3">Edit</button>
                      <button class="text-red-400 hover:text-red-300 transition-colors">Delete</button>
                    </td>
                  </tr>
                  <tr>
                    <td class="py-4 text-white">
                      <div class="flex items-center gap-4">
                        <img src="./assets/images/project-2.png" class="w-20 h-14 rounded-lg object-cover border border-white/10" alt="Thumbnail">
                        <div>
                          <div class="font-medium text-white">Signal Analytics</div>
                          <div class="text-xs text-primary mt-1">Featured</div>
                        </div>
                      </div>
                    </td>
                    <td class="py-4 text-white/60">Next.js, Charts, Auth</td>
                    <td class="py-4 text-white/60">Jan 15, 2026</td>
                    <td class="py-4 text-right">
                      <button class="text-primary hover:text-white transition-colors mr-3">Edit</button>
                      <button class="text-red-400 hover:text-red-300 transition-colors">Delete</button>
                    </td>
                  </tr>
                  <tr>
                    <td class="py-4 text-white">
                      <div class="flex items-center gap-4">
                        <img src="./assets/images/project-3.png" class="w-20 h-14 rounded-lg object-cover border border-white/10" alt="Thumbnail">
                        <div>
                          <div class="font-medium text-white">Pulse Landing</div>
                        </div>
                      </div>
                    </td>
                    <td class="py-4 text-white/60">Vite, SEO, Motion</td>
                    <td class="py-4 text-white/60">Dec 02, 2025</td>
                    <td class="py-4 text-right">
                      <button class="text-primary hover:text-white transition-colors mr-3">Edit</button>
                      <button class="text-red-400 hover:text-red-300 transition-colors">Delete</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Example Project Edit Form Mockup -->
            <div class="mt-8 p-6 rounded-2xl border border-white/10 bg-white/5">
              <h3 class="text-lg font-medium text-white mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Edit Project
              </h3>
              
              <div class="grid gap-6 md:grid-cols-[1fr,240px]">
                <div class="space-y-4">
                  <div class="grid gap-4 md:grid-cols-2">
                    <div>
                      <label class="block text-xs text-white/60 mb-1">Project Name</label>
                      <input type="text" value="Commerce Command" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                    </div>
                    <div>
                      <label class="block text-xs text-white/60 mb-1">Tech Stack (comma separated)</label>
                      <input type="text" value="React, PHP" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                    </div>
                  </div>
                  <div>
                    <label class="block text-xs text-white/60 mb-1">Description</label>
                    <textarea rows="3" class="w-full bg-background border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary/50">A high-performance e-commerce admin with real-time insights and accessible component architecture.</textarea>
                  </div>
                  <div class="flex items-center gap-2">
                    <input type="checkbox" id="featured" checked class="w-4 h-4 rounded border-white/10 bg-background accent-primary">
                    <label for="featured" class="text-sm text-white/80">Mark as Featured Project</label>
                  </div>
                </div>
                
                <div>
                  <label class="block text-xs text-white/60 mb-1">Project Image</label>
                  <div class="border-2 border-dashed border-white/10 rounded-xl bg-background p-2 text-center group hover:border-primary/30 transition-colors cursor-pointer">
                    <img src="./assets/images/project-1.png" class="w-full h-28 object-cover rounded-lg mb-2 border border-white/5" alt="Current Image">
                    <div class="text-xs text-white/50 group-hover:text-primary transition-colors">Click to upload new image</div>
                  </div>
                </div>
              </div>

              <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-white/5">
                <button class="px-4 py-2 bg-white/5 text-white rounded-lg text-sm hover:bg-white/10 transition-colors">Cancel</button>
                <button class="px-4 py-2 bg-primary text-background font-medium rounded-lg text-sm hover:bg-primary/90 transition-colors">Save Changes</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
